services:
  # ──────────────────────────────────────────────
  # API
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - credfluence
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: credfluence
      POSTGRES_PASSWORD: credfluence
      POSTGRES_DB: credfluence
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "statement_timeout=10s"
      - "-c"
      - "idle_in_transaction_session_timeout=30s"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credfluence -d credfluence"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - credfluence
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - credfluence
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Celery Worker
  # ──────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    networks:
      - credfluence
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Elasticsearch
  # ──────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - credfluence
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Celery Beat (scheduler)
  # ──────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.celery_app beat --loglevel=info
    networks:
      - credfluence
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  es_data:

networks:
  credfluence:
    driver: bridge
